<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering Phonemes | Kira's English</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        .action-card { background: #000; border-left: 4px solid #D30000; border-radius: 8px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); width: 95%; max-width: 450px; box-sizing: border-box; }
        
        .section-header { color: #ffffff; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border-bottom: 1.5px solid #D30000; padding-bottom: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .progress-container { width: 100%; background: #222; height: 6px; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: #D30000; width: 0%; transition: width 0.4s ease; }
        
        .exercise-block { background: #111; padding: 30px; border-radius: 10px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        
        .target-text { color: #ffffff; font-size: 2.2rem; font-weight: 700; margin-bottom: 5px; display: block; line-height: 1.1; }
        .ipa-text { color: #D30000; font-size: 1.4rem; font-weight: 400; margin-bottom: 10px; display: block; letter-spacing: 1px; }

        .translation-text { color: #666; font-size: 1rem; font-style: italic; margin-bottom: 20px; min-height: 24px; cursor: pointer; transition: 0.3s; }
        .translation-text:hover { color: #aaa; }
        .blur { filter: blur(5px); opacity: 0.5; }
        
        button { width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; margin: 8px 0; border: none; transition: 0.3s; }
        
        .btn-listen { background: #252525; color: white; border: 1px solid #444; }
        .btn-speak { background: #D30000; color: white; position: relative; box-shadow: 0 4px 15px rgba(211, 0, 0, 0.3); }
        .btn-next { background: #00FF00; color: #000; margin-top: 15px; }
        .btn-skip { background: transparent; color: #555; border: 1px solid #222; font-size: 0.7rem; margin-top: 15px; }

        #feedback { margin-top: 20px; min-height: 50px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        .success { color: #00FF00; }
        .error { color: #D30000; }
        .hidden { display: none; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0.7); } 70% { box-shadow: 0 0 0px 20px rgba(211, 0, 0, 0); } 100% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0); } }
        .listening-active { animation: pulse-red 1.5s infinite; background-color: #ff0000 !important; }
    </style>
</head>
<body>

<div class="action-card">
    <div class="section-header">
        <span>Vowel Sounds Mastery</span>
        <span id="counter" style="color: #D30000;">1 / 48</span>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="quiz-area">
        <div class="exercise-block" id="block">
            <span class="target-text" id="txt">Ago</span>
            <span class="ipa-text" id="ipa">/əˈɡoʊ/</span>
            
            <div id="translation" class="translation-text blur" onclick="toggleBlur()">Hace (tiempo)</div>
            
            <button class="btn-listen" onclick="play()">1. Escuchar Audio 🔊</button>
            <button class="btn-speak" id="mic" onclick="start()">2. Presiona y Habla 🎤</button>
            
            <div id="feedback">Listo para empezar.</div>

            <button id="next" class="btn-next hidden" onclick="go()">Siguiente Palabra ➔</button>
            <button id="skip" class="btn-skip" onclick="go()">Saltar palabra</button>
        </div>
    </div>
</div>

<script>
    const data = [
        // /ə/ (The Schwa)
        { t: "Ago", p: "/əˈɡoʊ/", s: "Hace (tiempo)" },
        { t: "Soda", p: "/ˈsoʊ.də/", s: "Refresco" },
        { t: "About", p: "/əˈbaʊt/", s: "Sobre / Acerca de" },
        { t: "Paper", p: "/ˈpeɪ.pər/", s: "Papel" },
        { t: "Upon", p: "/əˈpɑːn/", s: "Sobre / Encima de" },
        { t: "Mother", p: "/ˈmʌð.ər/", s: "Madre" },
        { t: "Banana", p: "/bəˈnæn.ə/", s: "Plátano" },
        { t: "Problem", p: "/ˈprɑː.bləm/", s: "Problema" },
        { t: "Elephant", p: "/ˈel.ə.fənt/", s: "Elefante" },
        { t: "Animal", p: "/ˈæn.ɪ.məl/", s: "Animal" },
        { t: "Support", p: "/səˈpɔːrt/", s: "Apoyo / Soportar" },
        { t: "Listen", p: "/ˈlɪs.ən/", s: "Escuchar" },

        // /ɜ:/ (American: Nurse)
        { t: "Bird", p: "/bɜːrd/", s: "Pájaro" },
        { t: "Work", p: "/wɜːrk/", s: "Trabajo / Trabajar" },
        { t: "Girl", p: "/ɡɜːrl/", s: "Niña / Chica" },
        { t: "Learn", p: "/lɜːrn/", s: "Aprender" },
        { t: "Word", p: "/wɜːrd/", s: "Palabra" },
        { t: "Person", p: "/ˈpɜːr.sən/", s: "Persona" },
        { t: "Earth", p: "/ɜːrθ/", s: "Tierra" },
        { t: "First", p: "/fɜːrst/", s: "Primero" },
        { t: "Serve", p: "/sɜːrv/", s: "Servir" },
        { t: "Turn", p: "/tɜːrn/", s: "Girar / Turno" },
        { t: "Church", p: "/tʃɜːrtʃ/", s: "Iglesia" },
        { t: "Early", p: "/ˈɜːr.li/", s: "Temprano" },

        // /ɪ/ (American: Kit)
        { t: "Sit", p: "/sɪt/", s: "Sentarse" },
        { t: "In", p: "/ɪn/", s: "En" },
        { t: "Fish", p: "/fɪʃ/", s: "Pez / Pescado" },
        { t: "Big", p: "/bɪɡ/", s: "Grande" },
        { t: "Milk", p: "/mɪlk/", s: "Leche" },
        { t: "Ship", p: "/ʃɪp/", s: "Barco" },
        { t: "Miss", p: "/mɪs/", s: "Extrañar / Perder" },
        { t: "Drink", p: "/drɪŋk/", s: "Beber" },
        { t: "List", p: "/lɪst/", s: "Lista" },
        { t: "Wind", p: "/wɪnd/", s: "Viento" },
        { t: "Fill", p: "/fɪl/", s: "Llenar" },
        { t: "King", p: "/kɪŋ/", s: "Rey" },

        // /æ/ (American: Trap)
        { t: "Cat", p: "/kæt/", s: "Gato" },
        { t: "Hat", p: "/hæt/", s: "Sombrero" },
        { t: "Map", p: "/mæp/", s: "Mapa" },
        { t: "Back", p: "/bæk/", s: "Atrás" },
        { t: "Apple", p: "/ˈæp.əl/", s: "Manzana" },
        { t: "Happy", p: "/ˈhæp.i/", s: "Feliz" },
        { t: "Hand", p: "/hænd/", s: "Mano" },
        { t: "Last", p: "/læst/", s: "Último" },
        { t: "Fast", p: "/fæst/", s: "Rápido" },
        { t: "Plan", p: "/plæn/", s: "Plan" },
        { t: "Black", p: "/blæk/", s: "Negro" },
        { t: "Stand", p: "/stænd/", s: "Estar de pie" }
    ];

    let idx = 0;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if(rec) { rec.lang = 'en-US'; rec.continuous = false; }

    function toggleBlur() { document.getElementById('translation').classList.toggle('blur'); }

    function play() {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(data[idx].t);
        u.lang = 'en-US';
        u.rate = 0.75;
        window.speechSynthesis.speak(u);
    }

    function start() {
        if (!rec) return alert("Micro no compatible.");
        try { rec.start(); } catch(e) {}
        document.getElementById('mic').classList.add('listening-active');
        document.getElementById('mic').innerText = "2. Presiona y Habla 🎤";
    }

    rec.onresult = (e) => {
        let heard = e.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g,"").trim();
        let target = data[idx].t.toLowerCase().replace(/[.,!?]/g,"").trim();
        const fb = document.getElementById('feedback');

        if (heard.includes(target) || target.includes(heard)) {
            fb.innerHTML = `<span class="success">¡Muy bien! Escuché "${target}"</span>`;
            document.getElementById('next').classList.remove('hidden');
            document.getElementById('skip').classList.add('hidden');
        } else {
            fb.innerHTML = `<span class="error">Escuché: "${heard}"...</span>`;
        }
    };

    rec.onend = () => {
        document.getElementById('mic').classList.remove('listening-active');
        document.getElementById('mic').innerText = "2. Presiona y Habla 🎤";
    };

    function go() {
        idx++;
        if (idx < data.length) {
            document.getElementById('txt').innerText = data[idx].t;
            document.getElementById('ipa').innerText = data[idx].p;
            document.getElementById('translation').innerText = data[idx].s;
            document.getElementById('translation').classList.add('blur');
            document.getElementById('counter').innerText = `${idx + 1} / ${data.length}`;
            document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('skip').classList.remove('hidden');
            document.getElementById('feedback').innerHTML = "Listo.";
        } else {
            document.getElementById('quiz-area').innerHTML = `<h2 style="color:#00FF00">¡MAESTRÍA TOTAL!</h2><button class="btn-speak" onclick="location.reload()">REINICIAR</button>`;
        }
    }

    document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
</script>
</body>
</html>
